<!-- ask.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Inline theme script to prevent flash -->
  <script>
    (function() {
      var stored = localStorage.getItem('rehab-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (stored === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">
  <title>Ask AI · rehablix</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <!-- Marked for rendering AI responses -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- File-reading helpers for attachments (loaded on demand by js/ask.js, listed here for caching) -->
  <link rel="preload" as="script" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
  <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js">
  <link rel="preload" as="script" href="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
  <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/ask.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-left">
        <div class="logo-text">
          <span class="logo-lop">rehablix</span>
          <span class="logo-full">ask ai</span>
        </div>
      </div>
      <div class="nav-right">
        <a href="index.html" class="icon-btn home-icon" aria-label="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9L12 3L21 9L21 20H15V14H9V20H3V9Z" stroke="currentColor" fill="none"/>
          </svg>
        </a>
        <button class="icon-btn history-nav-btn" id="historyNavBtn" aria-label="History" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 8V12L15 15M12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12C21 16.9706 16.9706 21 12 21Z" stroke="currentColor" fill="none"/>
          </svg>
        </button>
        <button class="icon-btn theme-toggle" id="themeToggle" aria-label="theme mode">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="ask-main">
    <div class="ask-container">
      <div class="chat-messages" id="chatMessages">
        <div class="empty-chat">
          <div class="empty-chat-icon">💬</div>
          <p>Ask me anything about rehabilitation, conditions, assignments, or clinical reasoning.</p>
          <p class="empty-chat-hint">Your conversation will be saved automatically when you're logged in.</p>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="attachments-strip" id="attachmentsStrip" hidden></div>
        <div class="composer-wrap">
          <div class="attach-menu" id="attachMenu" hidden>
            <button type="button" data-mode="camera"><i class="fas fa-camera"></i> Camera</button>
            <button type="button" data-mode="photos"><i class="fas fa-image"></i> Photos</button>
            <button type="button" data-mode="videos"><i class="fas fa-video"></i> Videos</button>
            <button type="button" data-mode="files"><i class="fas fa-folder-open"></i> Files</button>
          </div>
          <div class="composer">
            <input type="file" id="fileInput" hidden multiple
                   accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.txt,.zip,.csv,.md">
            <textarea id="messageInput" rows="1" placeholder="Type your question..." aria-label="Message"></textarea>
            <div class="composer-controls">
              <button id="attachBtn" class="plus-btn" aria-label="Add" title="Add">
                <i class="fas fa-plus"></i>
              </button>
              <div class="composer-controls-right">
                <button id="micBtn" class="icon-round-btn" aria-label="Voice input" title="Voice input">
                  <i class="fas fa-microphone"></i>
                </button>
                <button id="sendBtn" aria-label="Send message"><i class="fas fa-paper-plane"></i></button>
              </div>
            </div>
          </div>
        </div>
        <p class="input-hint" id="inputHint" style="display:none">Shift+Enter for a new line · Enter to send</p>
      </div>
    </div>
  </main>

  <!-- History Drawer -->
  <aside class="history-drawer" id="historyDrawer">
    <div class="drawer-header">
      <h3><i class='bx bx-time-five'></i> Chat History</h3>
      <button id="closeDrawerBtn" class="drawer-close-btn"><i class='bx bx-x'></i></button>
    </div>
    <div class="drawer-actions">
      <button id="newChatBtn" class="new-chat-btn"><i class="fas fa-plus"></i> New Chat</button>
    </div>
    <div class="history-search">
      <i class="fas fa-search"></i>
      <input type="text" id="historySearchInput" placeholder="Search conversations...">
    </div>
    <div class="history-content" id="historyList">
      <div class="empty-state">
        <i class='bx bx-folder-open'></i>
        <p>No conversations yet</p>
      </div>
    </div>
  </aside>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/handoff.js"></script>
  <script src="js/ask.js"></script>
</body>
</html>
