<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result · rehab.ai</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/documentation.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-left">
        <a href="documentation.html" class="back-btn icon-btn" aria-label="back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </a>
        <span class="logo-icon" aria-hidden="true">⚕️</span>
        <div class="logo-text">
          <span class="logo-lop">rehab.ai</span>
          <span class="logo-full">saved result</span>
        </div>
      </div>
      <div class="nav-right">
        <button class="icon-btn theme-toggle" id="themeToggle" aria-label="theme mode">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="btn-login" id="loginBtn" style="display:none">Login</button>
        <div class="profile-dropdown" id="profileDropdown" style="display: none;">
          <button class="btn-profile" id="profileBtn"><span class="profile-icon" id="profileIcon">👤</span><span class="profile-name" id="profileName"></span></button>
          <div class="dropdown-menu" id="dropdownMenu">
            <button class="dropdown-item" id="profileMenuItem"><span>👤</span> My Profile</button>
            <button class="dropdown-item" id="settingsMenuItem"><span>⚙️</span> Settings</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" id="logoutMenuItem"><span>🚪</span> Logout</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="result-main">
    <div class="result-container glass-card">
      <div id="resultDisplay" class="result-display">
        <div class="loading-spinner"></div>
        <p>Loading result...</p>
      </div>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>
  <div id="authModal" class="modal">...</div> <!-- same modal markup as before, omitted for brevity -->

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
