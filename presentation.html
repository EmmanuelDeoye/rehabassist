<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">
  <title>rehablix · Presentation Maker</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/presentation.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-left">
        <div class="logo-text">
          <span class="logo-lop">rehablix</span>
          <span class="logo-full">presentation maker</span>
        </div>
      </div>
      <div class="nav-right">
        <a href="index.html" class="icon-btn home-icon" aria-label="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9L12 3L21 9L21 20H15V14H9V20H3V9Z" stroke="currentColor" fill="none"/>
          </svg>
        </a>
        <button class="icon-btn theme-toggle" id="themeToggle" aria-label="theme mode">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <!-- Auth elements will be injected by modal.js -->
      </div>
    </div>
  </nav>

  <main class="construction-main">
    <div class="construction-container">
      <div class="orbit-wrapper">
        <div class="orbit-ring" id="orbitRing">
          <!-- Icons will be injected by JS -->
        </div>
        <div class="central-icon">🏗️</div>
      </div>
      <div class="construction-text">
        <h1>Presentation Maker</h1>
        <div class="coming-soon">
          <span class="badge">🚧 Under Construction 🚧</span>
          <p>We're crafting an amazing tool to turn your ideas into stunning presentations.</p>
          <p>Stay tuned – it's coming soon!</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>© rehablix — AI tools for rehabilitation</p>
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/modal.js"></script>        <!-- Creates auth modal, toast, etc. -->
  <script src="js/auth.js"></script>         <!-- Auth logic -->
  <script src="js/presentation.js"></script> <!-- Presentation maker logic -->
</body>
</html>
