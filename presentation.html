<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
  <title>rehab.ai · Presentation Maker</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/presentation.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-left">
        <div class="logo-text">
          <span class="logo-lop">rehab.ai</span>
          <span class="logo-full">presentation maker</span>
        </div>
      </div>
      <div class="nav-right">
        <a href="index.html" class="icon-btn" aria-label="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9L12 3L21 9L21 20H15V14H9V20H3V9Z" stroke="currentColor" fill="none"/>
          </svg>
        </a>
        <button class="icon-btn theme-toggle" id="themeToggle" aria-label="theme mode">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <!-- Login Button (shown when logged out) -->
        <button class="btn-login" id="loginBtn" style="display:none">Login</button>
        <!-- Profile Button (shown when logged in) -->
        <div class="profile-dropdown" id="profileDropdown" style="display: none;">
          <button class="btn-profile" id="profileBtn">
            <span class="profile-icon" id="profileIcon">👤</span>
            <span class="profile-name" id="profileName"></span>
          </button>
          <div class="dropdown-menu" id="dropdownMenu">
            <button class="dropdown-item" id="profileMenuItem"><span>👤</span> My Profile</button>
            <button class="dropdown-item" id="settingsMenuItem"><span>⚙️</span> Settings</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" id="logoutMenuItem"><span>🚪</span> Logout</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="construction-main">
    <div class="construction-container">
      <div class="orbit-wrapper">
        <div class="orbit-ring" id="orbitRing">
          <!-- Icons will be injected by JS -->
        </div>
        <div class="central-icon">🏗️</div>
      </div>
      <div class="construction-text">
        <h1>Presentation Maker</h1>
        <div class="coming-soon">
          <span class="badge">🚧 Under Construction 🚧</span>
          <p>We're crafting an amazing tool to turn your ideas into stunning presentations.</p>
          <p>Stay tuned – it's coming soon!</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>© rehab.ai — AI tools for rehabilitation</p>
  </footer>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <!-- Auth Modal -->
  <div id="authModal" class="modal">
    <div class="modal-content glass">
      <button class="modal-close" id="closeModal">&times;</button>
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab">Login</button>
        <button class="auth-tab" id="registerTab">Register</button>
      </div>
      <form id="loginForm" class="auth-form active">
        <h2>Welcome Back</h2>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        <div class="form-footer">
          <a href="#" class="forgot-link" id="forgotPassword">Forgot password?</a>
        </div>
        <button type="submit" class="auth-btn" id="loginSubmitBtn">Login</button>
        <div id="loginError" class="error-message"></div>
      </form>
      <form id="registerForm" class="auth-form">
        <h2>Join rehab.ai</h2>
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" required placeholder="••••••••" minlength="6">
        </div>
        <div class="form-group">
          <label for="regRepeatPassword">Repeat Password</label>
          <input type="password" id="regRepeatPassword" required placeholder="••••••••" minlength="6">
        </div>
        <div class="form-group">
          <label for="voiceRange">Specialization</label>
          <select id="voiceRange" required>
            <option value="">Select your area</option>
            <option value="physical">Physical Therapy</option>
            <option value="occupational">Occupational Therapy</option>
            <option value="speech">Speech Therapy</option>
            <option value="neurological">Neurological Rehabilitation</option>
            <option value="pediatric">Pediatric Rehabilitation</option>
          </select>
        </div>
        <div class="form-group checkbox">
          <input type="checkbox" id="terms" required>
          <label for="terms">I agree to the <a href="#">terms and conditions</a></label>
        </div>
        <button type="submit" class="auth-btn" id="registerSubmitBtn">Create Account</button>
        <div id="registerError" class="error-message"></div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/presentation.js"></script>
</body>
</html>
