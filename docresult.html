<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">
    <title>rehab.ai · Analysis Document</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Markdown for initial rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- docx for export -->
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/docresult.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <span class="logo-icon" aria-hidden="true">⚕️</span>
                <div class="logo-text">
                    <span class="logo-lop">rehabassist</span>
                    <span class="logo-full">document editor</span>
                </div>
            </div>
            <div class="nav-right">
                <a href="index.html" class="icon-btn home-icon" aria-label="Home">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 9L12 3L21 9L21 20H15V14H9V20H3V9Z" stroke="currentColor" fill="none"/>
                    </svg>
                </a>
                <a href="documentation.html" class="icon-btn" aria-label="Back to Analysis">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </a>
                <button class="icon-btn theme-toggle" id="themeToggle" aria-label="theme mode">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <div class="profile-dropdown" id="profileDropdown" style="display: none;">
                    <button class="btn-profile" id="profileBtn">
                        <span class="profile-icon" id="profileIcon">👤</span>
                        <span class="profile-name" id="profileName"></span>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <button class="dropdown-item" id="profileMenuItem"><span>👤</span> My Profile</button>
                        <button class="dropdown-item" id="settingsMenuItem"><span>⚙️</span> Settings</button>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item" id="logoutMenuItem"><span>🚪</span> Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="doc-main">
        <div class="doc-container">
            <div class="doc-toolbar">
                <div class="doc-meta">
                    <span class="doc-badge">rehab.ai Analysis</span>
                    <span class="doc-date" id="docDate"></span>
                </div>
                <div class="doc-actions">
                    <button class="tool-btn" id="saveEditBtn" title="Save changes">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button class="tool-btn" id="downloadDocBtn" title="Download as Word">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <button class="tool-btn" id="printDocBtn" title="Print">
                        <i class="fas fa-print"></i> Print
                    </button>
                    <button class="tool-btn secondary" id="closeDocBtn">
                        <i class="fas fa-times"></i> Close
                    </button>
                </div>
            </div>
            
            <!-- Formatting toolbar for rich text editing -->
            <div class="formatting-toolbar">
                <button class="format-btn" data-command="bold"><i class="fas fa-bold"></i></button>
                <button class="format-btn" data-command="italic"><i class="fas fa-italic"></i></button>
                <button class="format-btn" data-command="underline"><i class="fas fa-underline"></i></button>
                <button class="format-btn" data-command="insertUnorderedList"><i class="fas fa-list-ul"></i></button>
                <button class="format-btn" data-command="insertOrderedList"><i class="fas fa-list-ol"></i></button>
                <button class="format-btn" data-command="justifyLeft"><i class="fas fa-align-left"></i></button>
                <button class="format-btn" data-command="justifyCenter"><i class="fas fa-align-center"></i></button>
                <button class="format-btn" data-command="justifyRight"><i class="fas fa-align-right"></i></button>
                <button class="format-btn" data-command="createLink"><i class="fas fa-link"></i></button>
                <button class="format-btn" data-command="removeFormat"><i class="fas fa-eraser"></i></button>
            </div>
            
            <!-- Editable content area -->
            <div id="editorContent" class="editor-content" contenteditable="true"></div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/docresult.js"></script>
    <script>
        // Theme toggle
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            function setTheme(theme) {
                html.setAttribute('data-theme', theme);
                localStorage.setItem('rehab-theme', theme);
            }
            const saved = localStorage.getItem('rehab-theme') || 'light';
            setTheme(saved);
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const current = html.getAttribute('data-theme');
                    setTheme(current === 'light' ? 'dark' : 'light');
                });
            }
        })();
    </script>
</body>
</html>
