<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">
    <title>rehablix · Gait Report</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Marked for rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- docx for Word export -->
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <!-- html2pdf for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/gaitresult.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="logo-text">
                    <span class="logo-lop">rehablix</span>
                    <span class="logo-full">gait report</span>
                </div>
            </div>
            <div class="nav-right">
                <a href="index.html" class="icon-btn home-icon" aria-label="Home">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 9L12 3L21 9L21 20H15V14H9V20H3V9Z" stroke="currentColor" fill="none"/>
                    </svg>
                </a>
                <button class="icon-btn theme-toggle" id="themeToggle" aria-label="theme mode">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <!-- Auth elements will be injected by modal.js -->
            </div>
        </div>
    </nav>

    <main class="gaitresult-main">
        <div class="gaitresult-container">
            <!-- Header with metadata -->
            <div class="gait-header">
                <div class="gait-header-content">
                    <h1>Gait Analysis Report</h1>
                    <div class="gait-metadata">
                        <div class="metadata-item">
                            <i class="fas fa-user"></i>
                            <span id="gaitPatientName">Loading...</span>
                        </div>
                        <div class="metadata-item">
                            <i class="fas fa-calendar-alt"></i>
                            <span id="gaitDate">-</span>
                        </div>
                        <div class="metadata-item">
                            <i class="fas fa-eye"></i>
                            <span id="gaitView">-</span>
                        </div>
                        <div class="metadata-item">
                            <i class="fas fa-clock"></i>
                            <span id="gaitLastEdited">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons Bar -->
            <div class="action-bar">
                <div class="action-bar-wrapper">
                    <div class="action-group">
                        <button class="action-btn" id="shareBtn" title="Share Report">
                            <i class="fas fa-share-alt"></i> <span>Share</span>
                        </button>
                        <button class="action-btn" id="copyBtn" title="Copy to Clipboard">
                            <i class="fas fa-copy"></i> <span>Copy</span>
                        </button>
                        <button class="action-btn" id="downloadBtn" title="Download as Word">
                            <i class="fas fa-download"></i> <span>Word</span>
                        </button>
                        <button class="action-btn" id="pdfBtn" title="Save as PDF">
                            <i class="fas fa-file-pdf"></i> <span>PDF</span>
                        </button>
                        <button class="action-btn" id="printBtn" title="Print Report">
                            <i class="fas fa-print"></i> <span>Print</span>
                        </button>
                    </div>
                    <div class="action-group">
                        <button class="action-btn" id="saveEditBtn" title="Save Changes">
                            <i class="fas fa-save"></i> <span>Save</span>
                        </button>
                        <button class="action-btn" id="closeGaitBtn" title="Close Editor">
                            <i class="fas fa-times"></i> <span>Close</span>
                        </button>
                    </div>
                </div>
                
                <!-- Owner-only public toggle -->
                <div id="publicToggleContainer" style="display: none;" class="public-toggle no-print">
                    <label class="switch-label">
                        <span>🔓 Make public</span>
                        <div class="switch">
                            <input type="checkbox" id="publicToggle">
                            <span class="slider round"></span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Formatting Toolbar -->
            <div class="formatting-toolbar">
                <div class="format-group">
                    <button class="format-btn" data-command="bold" title="Bold (Ctrl+B)">
                        <i class="fas fa-bold"></i>
                    </button>
                    <button class="format-btn" data-command="italic" title="Italic (Ctrl+I)">
                        <i class="fas fa-italic"></i>
                    </button>
                    <button class="format-btn" data-command="underline" title="Underline (Ctrl+U)">
                        <i class="fas fa-underline"></i>
                    </button>
                    <button class="format-btn" data-command="strikeThrough" title="Strikethrough">
                        <i class="fas fa-strikethrough"></i>
                    </button>
                    <span class="divider"></span>
                    <button class="format-btn" data-command="justifyLeft" title="Align Left">
                        <i class="fas fa-align-left"></i>
                    </button>
                    <button class="format-btn" data-command="justifyCenter" title="Align Center">
                        <i class="fas fa-align-center"></i>
                    </button>
                    <button class="format-btn" data-command="justifyRight" title="Align Right">
                        <i class="fas fa-align-right"></i>
                    </button>
                    <button class="format-btn" data-command="justifyFull" title="Justify">
                        <i class="fas fa-align-justify"></i>
                    </button>
                </div>
                <div class="format-group">
                    <select class="format-select" id="fontFamilySelect" title="Font Family">
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Verdana">Verdana</option>
                    </select>
                    <select class="format-select" id="fontSizeSelect" title="Font Size">
                        <option value="1">8pt</option>
                        <option value="2">10pt</option>
                        <option value="3" selected>12pt</option>
                        <option value="4">14pt</option>
                        <option value="5">18pt</option>
                        <option value="6">24pt</option>
                        <option value="7">36pt</option>
                    </select>
                </div>
                <div class="format-group">
                    <button class="format-btn" data-command="insertUnorderedList" title="Bullet List">
                        <i class="fas fa-list-ul"></i>
                    </button>
                    <button class="format-btn" data-command="insertOrderedList" title="Numbered List">
                        <i class="fas fa-list-ol"></i>
                    </button>
                    <span class="divider"></span>
                    <button class="format-btn" data-command="indent" title="Increase Indent">
                        <i class="fas fa-indent"></i>
                    </button>
                    <button class="format-btn" data-command="outdent" title="Decrease Indent">
                        <i class="fas fa-outdent"></i>
                    </button>
                </div>
                <div class="format-group">
                    <button class="format-btn" data-command="createLink" title="Insert Link">
                        <i class="fas fa-link"></i>
                    </button>
                    <button class="format-btn" data-command="unlink" title="Remove Link">
                        <i class="fas fa-unlink"></i>
                    </button>
                    <span class="divider"></span>
                    <button class="format-btn" data-command="removeFormat" title="Clear Formatting">
                        <i class="fas fa-eraser"></i>
                    </button>
                    <button class="format-btn" data-command="undo" title="Undo (Ctrl+Z)">
                        <i class="fas fa-undo"></i>
                    </button>
                    <button class="format-btn" data-command="redo" title="Redo (Ctrl+Y)">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>
            </div>

            <!-- Editable content area -->
            <div class="editor-wrapper">
                <div id="editorContent" class="editor-content" contenteditable="true"></div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="status-left">
                    <span id="wordCount">0 words</span>
                    <span class="separator">|</span>
                    <span id="charCount">0 characters</span>
                </div>
                <div class="status-right">
                    <span id="saveStatus">Saved</span>
                    <span class="separator">|</span>
                    <span id="editMode">Editing Mode</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Share Modal -->
    <div id="shareModal" class="modal">
        <div class="modal-content glass share-modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-share-alt"></i> Share Gait Report</h3>
                <button class="modal-close share-close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Share this gait analysis report with your team:</p>
                <div class="share-link-container">
                    <input type="text" id="shareLink" readonly>
                    <button id="copyLinkBtn" class="btn-secondary">Copy Link</button>
                </div>
                <div class="share-options">
                    <button id="shareEmailBtn" class="share-option">
                        <i class="fas fa-envelope"></i> Email
                    </button>
                    <button id="shareWhatsAppBtn" class="share-option">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </button>
                    <button id="shareTwitterBtn" class="share-option">
                        <i class="fab fa-twitter"></i> Twitter
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/modal.js"></script>        <!-- Creates auth modal, toast, etc. -->
    <script src="js/auth.js"></script>         <!-- Auth logic -->
    <script src="js/theme.js"></script>        <!-- Theme logic -->
    <script src="js/tools.js"></script>        <!-- Shared tools logic -->
    <script src="js/gaitresult.js"></script>   <!-- Gait result editor logic -->
</body>
</html>
