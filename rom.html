<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">
  <title>rehablix · ROM Analyzer</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <!-- Marked for rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- docx for export -->
  <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/rom.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-left">
        <span class="logo-icon" aria-hidden="true"></span>
        <div class="logo-text">
          <span class="logo-lop">rehablix</span>
          <span class="logo-full">ROM analyzer</span>
        </div>
      </div>
      <div class="nav-right">
        <a href="index.html" class="icon-btn home-icon" aria-label="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 9L12 3L21 9L21 20H15V14H9V20H3V9Z" stroke="currentColor" fill="none"/>
          </svg>
        </a>
        
        <!-- History Button -->
        <button class="icon-btn" id="toggleHistoryBtn" aria-label="history" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 8V12L15 15M12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12C21 16.9706 16.9706 21 12 21Z" stroke="currentColor" fill="none"/>
          </svg>
        </button>
        
        <!-- Theme Toggle -->
        <button class="icon-btn theme-toggle" id="themeToggle" aria-label="theme mode">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <!-- Auth elements will be injected by modal.js -->
      </div>
    </div>
  </nav>

  <main class="rom-main">
    <div class="container">
      <!-- Progress Steps -->
      <div class="rom-progress">
        <div class="step active" data-step="1">
          <span class="step-number">1</span>
          <span class="step-label">Scan</span>
        </div>
        <div class="step-connector"></div>
        <div class="step" data-step="2">
          <span class="step-number">2</span>
          <span class="step-label">Analyze</span>
        </div>
        <div class="step-connector"></div>
        <div class="step" data-step="3">
          <span class="step-number">3</span>
          <span class="step-label">Results</span>
        </div>
      </div>

      <!-- Stage 1: Camera & Capture -->
      <div id="stageScan" class="stage-container active">
        <div class="glass-card camera-card full-width">
          <div class="camera-header">
            <h3><i class="fas fa-video"></i> Live Motion Scanner</h3>
            <p id="movementInstruction">Select a joint to begin</p>
          </div>
          
          <div class="joint-selection">
            <label for="jointSelect">Select Joint / Movement</label>
            <select id="jointSelect" class="joint-select">
              <option value="">-- Choose movement --</option>
              <option value="shoulder_flexion">Shoulder Flexion</option>
              <option value="shoulder_abduction">Shoulder Abduction</option>
              <option value="elbow_flexion">Elbow Flexion</option>
              <option value="hip_flexion">Hip Flexion</option>
              <option value="knee_flexion">Knee Flexion</option>
              <option value="ankle_dorsiflexion">Ankle Dorsiflexion</option>
              <option value="cervical_rotation">Cervical Rotation</option>
              <option value="lumbar_flexion">Lumbar Flexion</option>
            </select>
          </div>
          
          <div class="camera-controls">
            <button id="startCameraBtn" class="btn-primary" disabled>
              <i class="fas fa-play"></i> Start Scanning
            </button>
          </div>
          
          <div class="camera-view large">
            <video id="cameraPreview" autoplay playsinline muted></video>
            <canvas id="cameraCanvas" style="display: none;"></canvas>
            <!-- Scanning line overlay -->
            <div class="scan-overlay">
              <div class="scan-line"></div>
            </div>
            <div id="cameraPlaceholder" class="camera-placeholder">
              <i class="fas fa-camera"></i>
              <p>Camera not started</p>
            </div>
          </div>

          <!-- Movement prompt display -->
          <div id="movementPromptBox" class="movement-prompt-box" style="display: none;">
            <div class="prompt-header">
              <i class="fas fa-person-walking"></i>
              <span id="currentPrompt">Starting position</span>
            </div>
            <div class="prompt-progress">
              <span id="promptStep">0/0</span> movements captured
            </div>
          </div>

          <div id="capturePreview" class="capture-preview" style="display: none;">
            <h4>Captured Frames <span id="frameCount">0</span>/<span id="requiredFrames">0</span></h4>
            <div id="thumbnailContainer" class="thumbnail-container"></div>
            <button id="proceedToAnalysisBtn" class="btn-primary" disabled>
              <i class="fas fa-arrow-right"></i> Proceed to Analysis
            </button>
          </div>
        </div>
      </div>

      <!-- Stage 2: Analysis (Loading) -->
      <div id="stageAnalyze" class="stage-container">
        <div class="glass-card analysis-card">
          <div class="loading-container">
            <div class="rom-spinner"></div>
            <h3>Analyzing Range of Motion</h3>
            <p id="analysisStatus">Processing captured frames with AI...</p>
            <div class="analysis-progress">
              <div class="progress-bar" id="analysisProgressBar"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Stage 3: Results -->
      <div id="stageResults" class="stage-container">
        <div class="glass-card results-card">
          <div class="results-toolbar">
            <div class="results-meta">
              <span class="badge-ai">rehablix AI</span>
              <span id="resultDate"></span>
            </div>
            <div class="results-actions">
              <button id="downloadRomReport" class="tool-btn">
                <i class="fas fa-file-pdf"></i> Export Report
              </button>
              <button id="newScanBtn" class="tool-btn secondary">
                <i class="fas fa-redo-alt"></i> New Scan
              </button>
            </div>
          </div>
          <div id="romResultsContent" class="results-body typography-clean"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- History Drawer -->
  <aside class="history-drawer" id="historyDrawer">
    <div class="drawer-header">
      <h3><i class='bx bx-time-five'></i> ROM Analysis History</h3>
      <button id="closeDrawerBtn" class="drawer-close-btn"><i class='bx bx-x'></i></button>
    </div>
    <div class="history-content" id="historyList">
      <div class="empty-state">
        <i class='bx bx-folder-open'></i>
        <p>No history found</p>
      </div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/modal.js"></script>     <!-- Creates auth modal, toast, etc. -->
  <script src="js/auth.js"></script>      <!-- Auth logic -->
  <script src="js/theme.js"></script>     <!-- Theme logic -->
  <script src="js/tools.js"></script>     <!-- Shared tools logic -->
  <script src="js/rom.js"></script>       <!-- ROM analyzer logic -->
</body>
</html>
